default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: slsh_me_development

test:
  <<: *default
  database: slsh_me_test

# On Fly.io, DATABASE_URL is set automatically by `fly postgres attach`.
# Solid Queue, Solid Cache, and Solid Cable all share the primary PG database.
production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    idle_timeout: 300
    checkout_timeout: 10
    retry_deadline: 5
  cache:
    <<: *primary_production
    migrations_paths: db/cache_migrate
    database_tasks: false
  queue:
    <<: *primary_production
    migrations_paths: db/queue_migrate
    database_tasks: false
  cable:
    <<: *primary_production
    migrations_paths: db/cable_migrate
    database_tasks: false

# Name of your application. Used to uniquely configure containers.
service: slsh-me

# Name of the container image. Pushed to ghcr.io/stanboyet/slsh-me.
image: stanboyet/slsh-me

# Deploy to these servers.
servers:
  web:
    - 91.98.29.147

# Connect as the unprivileged deploy user (created by script/hetzner-bootstrap.sh).
ssh:
  user: deploy

# Give the container 60s to become healthy — Rails + Solid Queue + Puma cluster
# takes ~10-15s to boot on 2 vCPUs, and the 30s default leaves almost no slack.
deploy_timeout: 60

# kamal-proxy runs on host port 8080 (HTTP only, bound to localhost) and
# speaks to the app via the `kamal` docker network. TLS for slsh.me,
# app.slsh.me, and customer custom domains is terminated by the `caddy`
# accessory below — kamal-proxy only handles zero-downtime rollover.
#
# Why Caddy in front? kamal-proxy can only issue certs for hosts listed
# here, but customer custom domains are dynamic (users add CustomDomain
# records at any time). Caddy's on-demand TLS fetches certs from
# Let's Encrypt on the first request, gated by an ask hook that queries
# /domain_check to prevent random Host headers from burning our ACME
# rate limit. See config/Caddyfile.
proxy:
  ssl: false
  app_port: 3000
  healthcheck:
    path: /up
    interval: 3
    timeout: 5
  buffering:
    max_request_body: 10_000_000
  run:
    http_port: 8080
    bind_ips:
      - 127.0.0.1

# GitHub Container Registry. KAMAL_REGISTRY_PASSWORD comes from gh CLI in .kamal/secrets.
registry:
  server: ghcr.io
  username: stanboyet
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - DATABASE_URL
  clear:
    APP_HOST: slsh.me
    # Thruster listens on HTTP_PORT (kamal-proxy targets this; can't be 80 as uid 1000).
    HTTP_PORT: 3000
    # Thruster forwards to Puma on TARGET_PORT (sets PORT for the child process).
    TARGET_PORT: 3100
    RAILS_LOG_TO_STDOUT: "true"
    RAILS_SERVE_STATIC_FILES: "true"
    SOLID_QUEUE_IN_PUMA: true
    WEB_CONCURRENCY: 2
    RAILS_MAX_THREADS: 5

# Aliases triggered via `bin/kamal <alias>`.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
  release: app exec --reuse "bin/deploy"

# Persistent storage for Active Storage uploads (local disk, not S3).
volumes:
  - "slsh_me_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder. Build on the server itself — the Mac is arm64 and
# the server is amd64, so remote building skips cross-arch emulation.
builder:
  arch: amd64
  remote: ssh://deploy@91.98.29.147

# Accessories share the `kamal` docker network by default, so they can reach
# each other (and kamal-proxy) by container name.
accessories:
  # Postgres 17 on the same host. DATABASE_URL (in .kamal/secrets) targets
  # the kamal-internal hostname `slsh-me-db`.
  db:
    image: postgres:17
    host: 91.98.29.147
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: slsh_me
        POSTGRES_DB: slsh_me_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - postgres-data:/var/lib/postgresql/data

  # Caddy handles TLS for every host (see config/Caddyfile). It terminates
  # 80/443 on the public interface and forwards to kamal-proxy on the
  # internal docker network. On-demand TLS issues customer-domain certs on
  # first request.
  #
  # FIRST-TIME BOOT (one-time): Caddy will try to fetch fresh LE certs for
  # slsh.me + app.slsh.me. If Cloudflare is still proxying those records,
  # the HTTP-01/TLS-ALPN-01 challenges get intercepted. Before
  # `kamal accessory boot caddy`, gray-cloud both DNS records in CF, wait
  # for Caddy to issue certs (watch `kamal accessory logs caddy`), then
  # re-enable the orange cloud.
  caddy:
    image: caddy:2-alpine
    host: 91.98.29.147
    files:
      - config/Caddyfile:/etc/caddy/Caddyfile
    directories:
      - caddy-data:/data
      - caddy-config:/config
    options:
      publish:
        - "80:80"
        - "443:443"

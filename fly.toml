app            = "slsh-me"
primary_region = "cdg"

[build]

[deploy]
  release_command = "bin/rails db:prepare"

[env]
  RAILS_ENV           = "production"
  RAILS_LOG_TO_STDOUT = "true"
  RAILS_SERVE_STATIC_FILES = "true"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[processes]
  app    = "bin/thrust bin/rails server -p 3000 -b 0.0.0.0"
  worker = "bin/jobs"
